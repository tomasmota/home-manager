[[rule]]
toolName = "run_shell_command"
commandPrefix = ["gcloud"]
decision = "ask_user"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "gcloud config list",
  "gcloud config get-value",
  "gcloud auth list",
  "gcloud services list",
  "gcloud asset search-all-resources",
  "gcloud storage ls",
  "gcloud logging read"
]
decision = "allow"
priority = 900

[[rule]]
toolName = "run_shell_command"
commandRegex = 'gcloud\s+.*?\b(list|describe|get-iam-policy)\b'
decision = "allow"
priority = 900

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "gcloud projects delete",
  "gcloud organizations",
  "gcloud auth revoke"
]
decision = "deny"
priority = 950
