[[rule]]
toolName = "run_shell_command"
commandPrefix = ["kubectl"]
decision = "ask_user"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandRegex = 'kubectl\s+.*?\b(get|describe|explain|diff|logs|top|events|version|cluster-info|api-resources|api-versions)\b'
decision = "allow"
priority = 900

[[rule]]
toolName = "run_shell_command"
commandRegex = 'kubectl\s+.*?\bconfig\s+(view|current-context|get-contexts)\b'
decision = "allow"
priority = 900
