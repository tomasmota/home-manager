[[rule]]
toolName = "run_shell_command"
commandPrefix = ["tofu"]
decision = "ask_user"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "tofu version",
  "tofu plan",
  "tofu init",
  "tofu fmt",
  "tofu validate",
  "tofu show",
  "tofu output",
  "tofu state list",
  "tofu state show"
]
decision = "allow"
priority = 900

[[rule]]
toolName = "run_shell_command"
commandPrefix = ["tofu apply", "tofu destroy", "tofu state rm"]
decision = "deny"
priority = 950
