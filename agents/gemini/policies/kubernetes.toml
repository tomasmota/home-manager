priority = 100

[[rule]]
mcpName = "kubernetes"
toolName = [
  "configuration_contexts_list",
  "configuration_view",
  "events_list",
  "namespaces_list",
  "nodes_log",
  "nodes_stats_summary",
  "nodes_top",
  "pods_list",
  "pods_list_in_namespace",
  "pods_get",
  "pods_top",
  "pods_log",
  "resources_list",
  "resources_get"
]
decision = "allow"
priority = 900
